{% extends 'expenses/base.html' %}
{% block content %}

<div class="dashboard">
    <div class="summary-card">
        <p class="label">Total Spent</p>
        <h1 class="total">₹{{ total }}</h1>
    </div>

    <div class="filters">
        <form method="GET">
            <select name="category" onchange="this.form.submit()">
                <option value="">All Categories</option>
                {% for cat in categories %}
                <option value="{{ cat }}" {% if selected_category == cat %}selected{% endif %}>
                    {{ cat|capfirst }}
                </option>
                {% endfor %}
            </select>
        </form>
    </div>

    <div class="expense-list">
        {% for expense in expenses %}
        <div class="expense-item">
            <div class="expense-info">
                <span class="expense-title">{{ expense.title }}</span>
                <span class="expense-meta">{{ expense.category|capfirst }} · {{ expense.date }}</span>
            </div>
            <div class="expense-right">
                <span class="expense-amount">₹{{ expense.amount }}</span>
                <a href="{% url 'delete_expense' expense.pk %}" class="delete-btn" onclick="return confirm('Delete?')">✕</a>
            </div>
        </div>
        {% empty %}
        <p class="empty-msg">No expenses yet. <a href="{% url 'add_expense' %}">Add one!</a></p>
        {% endfor %}
    </div>
</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div class="chart-card" style="background: #1e293b; padding: 25px; border-radius: 12px; max-width: 360px; margin: 30px auto; box-shadow: 0 4px 15px rgba(0,0,0,0.35);">
    <h3 style="color: #f8fafc; text-align: center; margin-top: 0; font-family: sans-serif; font-size: 1.1rem; margin-bottom: 20px;">Spending Breakdown</h3>
    <div style="position: relative; height: 260px; width: 100%;">
        <canvas id="expensePieChart"></canvas>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('expensePieChart').getContext('2d');
        
        // Safely extract arrays from views pipeline
        const labelsData = {{ chart_labels|safe }};
        const valuesData = {{ chart_values|safe }};

        if (labelsData && labelsData.length > 0) {
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labelsData,
                    datasets: [{
                        data: valuesData,
                        backgroundColor: ['#2ec4b6', '#e71d36', '#ff9f1c', '#4cc9f0', '#ffb703', '#a2d2ff'],
                        borderWidth: 2,
                        borderColor: '#1e293b'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: '#94a3b8',
                                font: { size: 11, family: 'sans-serif' }
                            }
                        }
                    }
                }
            });
        } else {
            // Fail-safe view block state rules
            document.getElementById('expensePieChart').parentNode.innerHTML = 
                `<p style="color: #64748b; text-align: center; line-height: 240px; margin: 0; font-family: sans-serif;">Log an item to populate charts!</p>`;
        }
    });
</script>
{% endblock %}
